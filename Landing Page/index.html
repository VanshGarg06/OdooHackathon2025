<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Admin Panel</h1>
  </header>

  <nav>
    <button class="active" onclick="showSection('dashboard', this)">Dashboard</button>
    <button onclick="showSection('users', this)">Users</button>
    <button onclick="showSection('questions', this)">Questions</button>
    <button onclick="showSection('answers', this)">Answers</button>
  </nav>

  <main>
    <section id="dashboard" class="active">
      <div class="grid">
        <div class="card stat-card"><h3>Total Users</h3><p id="userCount">0</p></div>
        <div class="card stat-card"><h3>Total Questions</h3><p id="questionCount">0</p></div>
        <div class="card stat-card"><h3>Total Answers</h3><p id="answerCount">0</p></div>
      </div>
    </section>

    <!-- Users -->
    <section id="users">
      <div class="card">
        <h2>Users</h2>
        <input type="text" id="userName" placeholder="Enter user name" />
        <input type="text" id="userId" placeholder="Enter user ID" />
        <button class="btn btn-add" onclick="addUser()">Add User</button>
        <div id="userList"></div>
      </div>
    </section>

    <!-- Questions -->
    <section id="questions">
      <div class="card">
        <h2>Questions</h2>
        <input type="text" id="questionText" placeholder="Enter question" />
        <button class="btn btn-add" onclick="addQuestion()">Add Question</button>
        <div id="questionList"></div>
      </div>
    </section>

    <!-- Answers -->
    <section id="answers">
      <div class="card">
        <h2>Answers</h2>
        <div id="answerOverview"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
